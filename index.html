<!DOCTYPE html>
<html>
<head>
    <title>Cute Cat Pictures</title>
    <style>
        :root {
            --rosso-corsa: #D40000;
            --giallo-modena: #FCE903;
            --bianco-avus: #F2F3F6;
            --nero-daytona: #231F1C;
        }

        body {
            background: var(--rosso-corsa);
            font-family: 'Segoe UI', 'Open Sans', Arial, sans-serif;
            margin: 0;
            padding: 0;
            color: var(--bianco-avus);
            min-height: 100vh;
        }

        header {
            background: var(--rosso-corsa);
            color: var(--giallo-modena);
            padding: 40px 0 24px 0;
            text-align: center;
            box-shadow: 0 4px 24px 0 rgba(0,0,0,0.25);
            border-bottom: 4px solid var(--giallo-modena);
        }

        h1 {
            margin: 0;
            font-size: 3rem;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            text-shadow: 0 2px 8px rgba(0,0,0,0.5);
        }

        main {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 70vh;
        }

        .container {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 24px;
            box-shadow: 0 8px 32px 0 rgba(0,0,0,0.3);
            padding: 40px 32px 32px 32px;
            max-width: 420px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        button {
            background: var(--giallo-modena);
            border: none;
            color: var(--nero-daytona);
            cursor: pointer;
            font-family: inherit;
            font-size: 1.1rem;
            font-weight: 700;
            padding: 14px 36px;
            border-radius: 32px;
            text-transform: uppercase;
            letter-spacing: 2px;
            box-shadow: 0 2px 12px 0 rgba(0,0,0,0.2);
            transition: background 0.2s, color 0.2s, transform 0.1s;
            margin-bottom: 24px;
        }

        button:hover, button:focus {
            background: var(--bianco-avus);
            color: var(--rosso-corsa);
            transform: translateY(-2px) scale(1.04);
            outline: none;
        }

        img {
            display: block;
            margin: 0 auto;
            max-width: 100%;
            max-height: 340px;
            border-radius: 18px;
            box-shadow: 0 4px 24px 0 rgba(0,0,0,0.25);
            background: var(--bianco-avus);
            border: 3px solid var(--giallo-modena);
        }

        @media (max-width: 600px) {
            .container {
                padding: 24px 8px 16px 8px;
            }
            h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>Cute Cat Pictures</h1>
    </header>
    <main>
        <div class="container">
            <button id="cat-button">Click Here!!</button>
            <br>
            <img id="cat-image" src="" alt="Cute cat picture">
        </div>
    </main>

    <script>
        const catButton = document.querySelector('#cat-button');
        const catImage = document.querySelector('#cat-image');

        catButton.addEventListener('click', () => {
            fetch('https://api.thecatapi.com/v1/images/search')
                .then(response => response.json())
                .then(data => {
                    const catUrl = data[0].url;
                    catImage.src = catUrl;
                })
                .catch(error => console.log(error));
        });
	</script>
</body>
</html>
